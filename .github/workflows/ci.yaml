name: Build Status

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - run: npm ci
      - run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: 20.x
            nodemailer-version: 7
          - node-version: 20.x
            nodemailer-version: 8
          - node-version: 22.x
            nodemailer-version: 7
          - node-version: 22.x
            nodemailer-version: 8
          - node-version: 24.x
            nodemailer-version: 7
          - node-version: 24.x
            nodemailer-version: 8
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci

      - name: Install nodemailer@${{ matrix.nodemailer-version }}
        run: npm install nodemailer@${{ matrix.nodemailer-version }} --no-save

      - run: npm test

  coverage:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - run: npm ci

      - name: Install nodemailer@8
        run: npm install nodemailer@8 --no-save

      - run: npm run test-coverage
      - run: npm run test-coveralls

      - name: Coveralls
        uses: coverallsapp/github-action@v2
